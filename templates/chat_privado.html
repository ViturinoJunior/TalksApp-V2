<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TalksApp - Chat Privado</title>

    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />

    <style>
      .conversas-container {
        display: grid;
        grid-template-columns: 300px 1fr;
        height: 100vh;
      }

      .conversas-sidebar {
        background-color: #f0f0f0;
        border-right: 1px solid #ddd;
        overflow-y: auto;
        padding: 20px;
      }

      .conversas-sidebar h2 {
        margin-top: 0;
        margin-bottom: 20px;
        font-size: 1.2em;
      }

      .nova-conversa-btn {
        width: 100%;
        padding: 10px;
        margin-bottom: 20px;
        background-color: #007bff;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-size: 1em;
      }

      .nova-conversa-btn:hover {
        background-color: #0056b3;
      }

      .conversa-item {
        padding: 10px;
        margin-bottom: 10px;
        background-color: white;
        border-left: 3px solid #007bff;
        cursor: pointer;
        border-radius: 3px;
        transition: all 0.2s;
      }

      .conversa-item:hover {
        background-color: #e8f4f8;
        border-left-color: #0056b3;
      }

      .conversa-item.active {
        background-color: #d1ecf1;
        border-left-color: #0c5460;
        font-weight: bold;
      }

      .conversa-nome {
        font-weight: 500;
        color: #333;
      }

      .conversa-data {
        font-size: 0.85em;
        color: #999;
        margin-top: 5px;
      }

      .conversas-empty {
        color: #999;
        text-align: center;
        padding: 40px 20px;
      }

      .content-area {
        display: flex;
        flex-direction: column;
        background-color: white;
      }

      .chat-content {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #999;
      }

      .voltar-btn {
        padding: 8px 15px;
        background-color: #6c757d;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin-bottom: 10px;
      }

      .voltar-btn:hover {
        background-color: #5a6268;
      }

      .modal {
        display: none;
        position: fixed;
        z-index: 1000;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.4);
        animation: fadeIn 0.3s;
      }

      .modal-content {
        background-color: #fefefe;
        margin: 15% auto;
        padding: 20px;
        border: 1px solid #888;
        width: 80%;
        max-width: 400px;
        border-radius: 5px;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
      }

      .modal-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 15px;
      }

      .modal-header h2 {
        margin: 0;
      }

      .close-btn {
        font-size: 28px;
        font-weight: bold;
        color: #aaa;
        cursor: pointer;
        border: none;
        background: none;
      }

      .close-btn:hover {
        color: #000;
      }

      .usuarios-list {
        max-height: 300px;
        overflow-y: auto;
        border: 1px solid #ddd;
        border-radius: 3px;
      }

      .usuario-option {
        padding: 10px;
        cursor: pointer;
        border-bottom: 1px solid #eee;
        transition: background-color 0.2s;
      }

      .usuario-option:hover {
        background-color: #f5f5f5;
      }

      .usuario-option:last-child {
        border-bottom: none;
      }

      @media (max-width: 768px) {
        .conversas-container {
          grid-template-columns: 1fr;
        }

        .conversas-sidebar {
          display: none;
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="conversas-container">
      <!-- SIDEBAR DE CONVERSAS -->
      <div class="conversas-sidebar">
        <button class="nova-conversa-btn" onclick="abrirNovaConversa()">
          ➕ Nova Conversa
        </button>

        <button class="voltar-btn" onclick="window.location.href = '/chat'">
          ← Voltar ao Chat Público
        </button>

        <h3>Conversas Ativas</h3>

        <div id="conversasList" class="conversas-list">
          <div class="conversas-empty">Nenhuma conversa iniciada</div>
        </div>
      </div>

      <!-- ÁREA DE CONVERSA -->
      <div class="content-area">
        <div id="chatContent" class="chat-content">
          Selecione uma conversa para começar
        </div>
      </div>
    </div>

    <!-- MODAL PARA NOVA CONVERSA -->
    <div id="modalNovaConversa" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Iniciar Nova Conversa</h2>
          <button class="close-btn" onclick="fecharModal()">&times;</button>
        </div>
        <div id="usuariosDisponiveis" class="usuarios-list"></div>
      </div>
    </div>

    <script>
      const usuario = "{{ usuario }}";

      // Carregar conversas ao iniciar
      document.addEventListener("DOMContentLoaded", function () {
        carregarConversas();
        setInterval(carregarConversas, 3000); // Atualizar a cada 3 segundos
      });

      // Carregar conversas ativas
      function carregarConversas() {
        fetch("/conversas_ativas")
          .then((response) => response.json())
          .then((data) => {
            const lista = document.getElementById("conversasList");

            if (data.length === 0) {
              lista.innerHTML =
                '<div class="conversas-empty">Nenhuma conversa iniciada</div>';
              return;
            }

            let html = "";
            data.forEach((conversa) => {
              html += `
                <div class="conversa-item" onclick="abrirConversa(${conversa.id})">
                  <div class="conversa-nome">${conversa.outro_usuario}</div>
                  <div class="conversa-data">${conversa.criada_em}</div>
                </div>
              `;
            });

            lista.innerHTML = html;
          });
      }

      // Abrir modal de nova conversa
      function abrirNovaConversa() {
        const modal = document.getElementById("modalNovaConversa");
        modal.style.display = "block";

        fetch("/usuarios_disponiveis")
          .then((response) => response.json())
          .then((data) => {
            const lista = document.getElementById("usuariosDisponiveis");

            if (data.length === 0) {
              lista.innerHTML =
                "<div class='conversas-empty'>Nenhum usuário disponível</div>";
              return;
            }

            let html = "";
            data.forEach((usuario_nome) => {
              html += `
                <div class="usuario-option" onclick="iniciarConversa('${usuario_nome}')">
                  ${usuario_nome}
                </div>
              `;
            });

            lista.innerHTML = html;
          });
      }

      // Fechar modal
      function fecharModal() {
        document.getElementById("modalNovaConversa").style.display = "none";
      }

      // Iniciar conversa com um usuário
      function iniciarConversa(outro_usuario) {
        window.location.href = `/iniciar_conversa/${outro_usuario}`;
      }

      // Abrir conversa
      function abrirConversa(conversa_id) {
        window.location.href = `/conversa/${conversa_id}`;
      }

      // Fechar modal ao clicar fora dele
      window.onclick = function (event) {
        const modal = document.getElementById("modalNovaConversa");
        if (event.target == modal) {
          modal.style.display = "none";
        }
      };
    </script>
  </body>
</html>
